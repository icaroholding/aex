# fly.toml app configuration file generated for aex-control-plane on 2026-04-22T17:16:36+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'aex-control-plane'
primary_region = 'ams'
kill_signal = 'SIGTERM'
kill_timeout = '30s'

[build]
  # Path is relative to THIS fly.toml file (fly resolves build.dockerfile
  # against the config file's own directory, not the working dir).
  dockerfile = 'Dockerfile'

[env]
  BIND_ADDR = '0.0.0.0:8080'
  # Origins permitted to call this control plane. The web dashboard at
  # spize.io is the historic caller; the desktop app's Tauri WebView
  # uses `tauri://localhost` in production builds on macOS/Linux,
  # `https://tauri.localhost` on Windows, and `http://localhost:1420`
  # while running under `tauri dev`. The control-plane code parses this
  # as a comma-separated list (see aex-control-plane::build_cors_layer)
  # so anyone self-hosting AEX can swap these for their own origins.
  CORS_ALLOWED_ORIGINS = 'https://spize.io,tauri://localhost,https://tauri.localhost,http://localhost:1420'
  LOG_FORMAT = 'json'
  RUST_LOG = 'info,aex_control_plane=info,sqlx=warn'

[[mounts]]
  source = 'aex_data'
  destination = '/app/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  size = 'shared-cpu-1x'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512

[[metrics]]
  port = 8080
  path = '/metrics'
